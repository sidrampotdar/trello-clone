services:
  mongo:
    image: mongo:7
    container_name: kanban-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: kanban
      MONGO_INITDB_ROOT_PASSWORD: kanban
      MONGO_INITDB_DATABASE: trello_clone
    volumes:
      - kanban-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kanban-mongo-data:
